<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f9f9f9;color:#333;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .container{text-align:center;padding:2rem}
    h1{font-size:6rem;font-weight:700;color:#ddd;line-height:1}
    p{font-size:1.1rem;color:#888;margin:.5rem 0 1.5rem}
    a{color:#555;font-size:1rem;text-decoration:none;border-bottom:1px solid #ccc}
    a:hover{color:#333;border-color:#999}
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>Page not found</p>
    <a id="h">Go to Home Page</a>
  </div>
  <script>document.getElementById('h').href=location.origin</script>
</body>
</html>
